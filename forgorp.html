<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password: ScanCheck</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: #ffffff;
            font-family: sans-serif;
        }
        .wrapper{  
            width: 400px;
            background: #fff;
            padding: 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .wrapper h1{ 
            text-align: center;
            font-size: 32px;
            color: maroon;
            margin-bottom: 5px;
        }
        .wrapper h2{ 
            text-align: center;
            font-size: 18px;
            color: #555;
            margin-bottom: 25px;
            font-weight: normal;
        }
        .instructions {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .input-box {
            width: 90%;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            background: #fff;
            box-sizing: border-box;
        }

        .input-box input:focus {
            border-color: maroon;
        }

        /* Istilo para sa Show Password container */
        .show-password-container {
            width: 90%;
            text-align: left;
            margin: -5px 0 15px 0;
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }

        .show-password-container input {
            margin-right: 8px;
            cursor: pointer;
            accent-color: maroon;
        }

        .btn{
            width: 45%;
            height: 45px;
            border: none;
            border-radius: 5px;
            background: maroon;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: #600000;
        }

        .links-container {
            margin-top: 20px;
        }

        .links-container p {
            font-size: 15px;
            color: #333;
        }

        .links-container a {
            color: maroon;
            text-decoration: none;
            font-weight: bold;
        }

        .links-container a:hover {
            text-decoration: underline;
        }

        .message-display {
            font-size: 14px;
            margin-bottom: 10px;
            min-height: 20px;
        }
        .error {
            color: #dc3545;
        }
        .success {
            color: #28a745;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <form id="scanCheckForgotForm">
            <div id="stepVerify">
                <h1>Reset Password</h1>
                <h2>Teacher Portal</h2>
                
                <p class="instructions">Enter your registered username and Gmail address to find your account.</p>

                <center>
                <div id="messageDisplay1" class="message-display"></div>

                <div class="input-box">
                    <input type="text" id="username" placeholder="Enter Username" required>
                </div>

                <div class="input-box">
                    <input type="email" id="email" placeholder="Enter Gmail Address" required>
                </div>
                
                <button type="button" id="btnCheckAccount" class="btn">Verify</button>

                <div class="links-container">
                    <p>Remembered your password? <a href="log.html"><b>Login</b></a></p>
                </div>
                </center>
            </div>

            <div id="stepNewPassword" class="hidden">
                <h1>New Password</h1>
                <h2>Teacher Portal</h2>
                
                <p class="instructions">Create a new secure password for your account.</p>

                <center>
                <div id="messageDisplay2" class="message-display"></div>

                <div class="input-box">
                    <input type="password" id="newPassword" placeholder="Enter New Password" required>
                </div>

                <div class="input-box">
                    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                </div>

                <div class="show-password-container">
                    <label><input type="checkbox" id="togglePassword"> Show Password</label>
                </div>
                
                <button type="submit" class="btn">Update</button>
                </center>
            </div>
        </form>
    </div>

    <script>
        const forgotForm = document.getElementById('scanCheckForgotForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        
        const stepVerify = document.getElementById('stepVerify');
        const stepNewPassword = document.getElementById('stepNewPassword');
        
        const messageDisplay1 = document.getElementById('messageDisplay1');
        const messageDisplay2 = document.getElementById('messageDisplay2');
        
        const btnCheckAccount = document.getElementById('btnCheckAccount');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const togglePassword = document.getElementById('togglePassword'); // Element ng Checkbox

        let currentUsers = [];
        let matchedUserIndex = -1;

        // 1. PAG-VERIFY NG ACCOUNT
        btnCheckAccount.addEventListener('click', function() {
            const username = usernameInput.value.trim().toLowerCase();
            const email = emailInput.value.trim().toLowerCase();

            messageDisplay1.innerText = ""; 
            messageDisplay1.className = "message-display"; 

            if (!username || !email) {
                messageDisplay1.innerText = "Please fill in all fields.";
                messageDisplay1.classList.add('error');
                return;
            }

            currentUsers = JSON.parse(localStorage.getItem('scanCheckUsers')) || [];

            matchedUserIndex = currentUsers.findIndex(user => 
                user.username.toLowerCase() === username && 
                user.email.toLowerCase() === email
            );

            if (matchedUserIndex === -1) {
                messageDisplay1.innerText = "No matching account found with those credentials.";
                messageDisplay1.classList.add('error');
                return;
            }

            stepVerify.classList.add('hidden');
            stepNewPassword.classList.remove('hidden');
        });

        // 2. LOHIKA PARA SA SHOW/HIDE PASSWORD
        togglePassword.addEventListener('change', function() {
            if (this.checked) {
                newPasswordInput.type = 'text';
                confirmPasswordInput.type = 'text';
            } else {
                newPasswordInput.type = 'password';
                confirmPasswordInput.type = 'password';
            }
        });

        // 3. PAG-SAVE NG BAGONG PASSWORD
        forgotForm.addEventListener('submit', function(event) {
            event.preventDefault(); 

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            messageDisplay2.innerText = ""; 
            messageDisplay2.className = "message-display"; 

            if (newPassword !== confirmPassword) {
                messageDisplay2.innerText = "Passwords do not match.";
                messageDisplay2.classList.add('error');
                return;
            }

            currentUsers[matchedUserIndex].password = newPassword;
            localStorage.setItem('scanCheckUsers', JSON.stringify(currentUsers));

            messageDisplay2.innerText = "Success! Your password has been updated successfully. Redirecting...";
            messageDisplay2.classList.add('success');

            setTimeout(() => {
                window.location.href = "log.html"; 
            }, 3000);
        });
    </script>
</body>
</html>
