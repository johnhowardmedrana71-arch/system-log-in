<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanCheck: QR-Based Answer Evaluation System</title>
   
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: #ffffff;
        }

        .wrapper {
            width: 400px;
            background: #fff;
            padding: 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .wrapper h1 {
            text-align: center;
            font-size: 36px;
            color: maroon;
            margin-bottom: 5px;
        }

        .wrapper h2 { 
            text-align: center;
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
            font-weight: normal;
        }

        .input-box {
            width: 100%;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        .input-box input:focus {
            border-color: maroon;
        }

        .forgot-password {
            text-align: center;
            margin: 15px 0;
        }

        .forgot-password a {
            text-decoration: none;
            color: maroon;
            font-size: 15px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 5px;
            background: maroon;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #600000;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link p {
            color: #333;
            font-size: 15px;
        }

        .register-link a {
            color: maroon;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Styling for the error message */
        .error-message {
            color: #dc3545;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>
     
    <div class="wrapper">
        <form id="scanCheckLoginForm">
            <h1>Login</h1>
            <h2>Teacher Portal</h2>

            <div id="errorDisplay" class="error-message"></div>

            <div class="input-box">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <div class="forgot-password">
                <a href="forgorp.html">Forgot Password?</a>
            </div>

            <div class="Login">
               <button type="submit" class="btn">Login</button> 
            </div>            

            <div class="register-link">
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('scanCheckLoginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDisplay = document.getElementById('errorDisplay');

        // Static fallback admin account credentials
        const fallbackAdminUser = "admin";
        const fallbackAdminPass = "scancheck2026";

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent page reload

            const typedUsername = usernameInput.value.trim();
            const typedPassword = passwordInput.value;

            errorDisplay.innerText = ""; // Clear errors

            // 1. First, check if it's the static administrative account
            if (typedUsername.toLowerCase() === fallbackAdminUser && typedPassword === fallbackAdminPass) {
                window.location.href = "dashboard.html";
                return;
            }

            // 2. Otherwise, check the localStorage registered users array
            let registeredUsers = JSON.parse(localStorage.getItem('scanCheckUsers')) || [];

            // Look for a user matching username, password, and explicitly verified as a teacher
            const matchedTeacher = registeredUsers.find(user => 
                user.username.toLowerCase() === typedUsername.toLowerCase() && 
                user.password === typedPassword &&
                user.role === "teacher"
            );

            if (matchedTeacher) {
                // Store current session user profile if needed down the line
                sessionStorage.setItem('currentScanCheckUser', JSON.stringify(matchedTeacher));
                
                // Redirect straight to dashboard
                window.location.href = "dashboard.html";
            } else {
                errorDisplay.innerText = "Invalid Teacher Username or Password.";
            }
        });
    </script>
</body>
</html>
