<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Dashboard</title>
    <style> 
    
        /* CSS Reset para walang error sa margin */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR (Kaliwang bahagi ng sketch mo) */
        .sidebar {
            width: 250px;
            background-color: maroon;
            color: white;
            padding: 20px 0;
        }

        .sidebar-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            padding-bottom: 20px;
            border-bottom: 1px solid maroon;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #bdc3c7;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 16px;
        }

        /* Active/Hover state para sa mga tab */
        .sidebar a:hover, .sidebar a.active {
            background-color: maroon;
            color: white;
        }

        /* MAIN CONTENT AREA (Kanang bahagi ng sketch mo) */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* HEADER: Search Bar at + New Quiz Button */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        .search-bar {
            width: 60%;
            padding: 10px 15px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .btn-new-quiz {
            background-color: maroon;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* SUB-HEADER: Date & Files */
        .filter-section {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
        }

        .btn-date {
            padding: 8px 15px;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: maroon;
        }

        .files-label {
            font-size: 15px;
            color: maroon;
            font-weight: bold;
            cursor: pointer;
        }

        /* LOWER BOX (Ang kahon sa kanang ibaba) */
        .content-box {
            flex: 1;
            background-color: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #7f8c8d;
            font-size: 18px;
        }
    </style>
      <form action="http://localhost:3000/dashboard" method="POST"></form>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">ScanCheck</div>
        <a href="#" class="active">Home Page</a>
        <a href="#">Quizzes</a>
        <a href="#">Students</a>
        <a href="#">Account</a>
    </div>

    <div class="main-container">
        
        <div class="header-section">
            <input type="text" class="search-bar" placeholder="Search Bar...">
            <button class="btn-new-quiz">+ New Quiz</button>
        </div>

        <div class="filter-section">
            <button class="btn-date">DATE</button>
            <span class="files-label">Files</span>
        </div>

        <div class="content-box">
            <div style="text-align: center;">
                <p style="font-weight: bold; margin-bottom: 5px;">Main Content Area</p>
                <p style="font-size: 14px;">Nandito ang mga files o quiz details.</p>
            </div>
        </div>

    </div>

</body>
</html>
