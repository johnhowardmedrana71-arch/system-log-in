<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Teacher: ScanCheck</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: #ffffff;
        }
        .wrapper{  
            width: 400px;
            background: #fff;
            padding: 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .wrapper h1{ 
            text-align: center;
            font-size: 32px;
            color: maroon;
            margin-bottom: 5px;
        }
        .wrapper h2{ 
            text-align: center;
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
            font-weight: normal;
        }

        .input-box {
            width: 90%;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            background: #fff;
        }

        .input-box input:focus {
            border-color: maroon;
        }

        .btn{
            width: 45%;
            height: 45px;
            border: none;
            border-radius: 5px;
            background: maroon;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: #600000;
        }

        .register-link {
            margin-top: 20px;
        }

        .register-link p {
            font-size: 15px;
            color: #333;
        }

        .register-link a {
            color: maroon;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <form id="scanCheckRegisterForm">
            <h1>Register</h1>
            <h2>Teacher Portal</h2>

            <center>
            <div id="errorDisplay" class="error-message"></div>

            <div class="input-box">
                <input type="text" id="username" name="username" placeholder="Choose Username" required>
            </div>

            <div class="input-box">
                <input type="email" id="email" name="email" placeholder="Enter Gmail Address" required>
            </div>

            <input type="hidden" id="role" name="role" value="teacher">

            <div class="input-box">
                <input type="password" id="password" name="password" placeholder="Create Password" required>
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
            
            <button type="submit" class="btn">Create Account</button>

            <div class="register-link">
                <p>Already have an account? <a href="index.html"><b>Login</b></a></p>
            </div>
            </center>
        </form>
    </div>

    <script>
        const registerForm = document.getElementById('scanCheckRegisterForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const roleInput = document.getElementById('role');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const errorDisplay = document.getElementById('errorDisplay');

        registerForm.addEventListener('submit', function(event) {
            event.preventDefault(); 

            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const role = roleInput.value; 
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            errorDisplay.innerText = ""; 

            // Validation Check 1: Passwords Match
            if (password !== confirmPassword) {
                errorDisplay.innerText = "Passwords do not match.";
                return;
            }

            // NEW Validation Check 2: Password Complexity Enforcement
            const hasLetters = /[a-zA-Z]/.test(password);
            const hasUppercase = /[A-Z]/.test(password);
            const isAllNumbers = /^\d+$/.test(password);

            if (isAllNumbers) {
                errorDisplay.innerText = "Password cannot be entirely numbers.";
                return;
            }
            if (!hasLetters || !hasUppercase) {
                errorDisplay.innerText = "Password must include letters and at least one uppercase letter (Caps).";
                return;
            }

            let currentUsers = JSON.parse(localStorage.getItem('scanCheckUsers')) || [];

            // Validation Check 3: Duplicate Identity
            const userExists = currentUsers.some(user => user.username.toLowerCase() === username.toLowerCase());
            const isDefaultUser = ["teacher1", "student1", "admin"].includes(username.toLowerCase());

            if (userExists || isDefaultUser) {
                errorDisplay.innerText = "Username is already taken.";
                return;
            }

            currentUsers.push({
                username: username,
                email: email,
                role: role,
                password: password
            });

            localStorage.setItem('scanCheckUsers', JSON.stringify(currentUsers));
            alert("Teacher account registered successfully for " + username + "!");
            window.location.href = "log.html";
        });
    </script>
</body>
</html>
